<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1020"/>
      <stop offset="1" stop-color="#0D1730"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="0.55" stop-color="#7C9CF8"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="acc1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="acc3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16203C"/>
      <stop offset="1" stop-color="#111A33"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto">
      <path d="M1,1 L9,6 L1,11" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowG" markerWidth="13" markerHeight="13" refX="8" refY="6" orient="auto">
      <path d="M1,1 L9,6 L1,11" fill="none" stroke="#34D399" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="160" cy="110" r="190" fill="#7C3AED" opacity="0.16" filter="url(#soft)"/>
  <circle cx="1060" cy="690" r="220" fill="#0EA5E9" opacity="0.14" filter="url(#soft)"/>
  <rect x="0.5" y="0.5" width="1199" height="759" fill="none" stroke="#1E2A4A" stroke-width="1"/>

  <!-- header -->
  <g transform="translate(64,52)">
    <rect x="0" y="-26" width="40" height="40" rx="11" fill="url(#acc1)"/>
    <path d="M20,-19 a9,9 0 1 0 0.01,0 M20,-19 v18 M11,-7 h18" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
    <text x="58" y="4" font-size="34" font-weight="700" fill="url(#word)" letter-spacing="1.5">PROXIM</text>
    <text x="58" y="34" font-size="15.5" fill="#9FB0CC">How a verified output flows from one agent to another — and back into trust.</text>
  </g>

  <!-- ============ STAGE CARDS ============ -->
  <!-- card geometry: x=64/436/808, y=150, w=328, h=362 -->

  <!-- STAGE 1 -->
  <g filter="url(#shadow)">
    <rect x="64" y="150" width="328" height="362" rx="22" fill="url(#card)" stroke="#27345C" stroke-width="1.25"/>
  </g>
  <rect x="64" y="150" width="328" height="6" rx="3" fill="url(#acc1)"/>
  <circle cx="104" cy="200" r="21" fill="url(#acc1)"/>
  <text x="104" y="207" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <!-- key icon -->
  <g transform="translate(320,182)" stroke="#C4B5FD" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="8"/>
    <path d="M18,18 l16,16 M30,30 l5,-5 M26,26 l5,-5"/>
  </g>
  <text x="92" y="262" font-size="13" font-weight="700" fill="#A78BFA" letter-spacing="2">IDENTITY</text>
  <text x="92" y="290" font-size="21" font-weight="700" fill="#EAF0FB">Produce &amp; sign</text>
  <line x1="92" y1="306" x2="364" y2="306" stroke="#2A3760" stroke-width="1.25"/>
  <g font-size="14.5" fill="#AEBCD6">
    <text x="92" y="338">The producer hashes its output and</text>
    <text x="92" y="361">signs it with an Ed25519 private key.</text>
    <text x="92" y="384">The <tspan fill="#E4EAF6" font-weight="600">agent_id</tspan> is derived from the</text>
    <text x="92" y="407">key — an identity you cannot fake.</text>
  </g>
  <g font-size="12.5" font-weight="600">
    <rect x="92" y="446" width="98" height="30" rx="15" fill="#251C4A" stroke="#5B47A8"/>
    <text x="141" y="466" fill="#C9BCF7" text-anchor="middle">Ed25519</text>
    <rect x="200" y="446" width="138" height="30" rx="15" fill="#251C4A" stroke="#5B47A8"/>
    <text x="269" y="466" fill="#C9BCF7" text-anchor="middle">self-certifying</text>
  </g>

  <!-- STAGE 2 -->
  <g filter="url(#shadow)">
    <rect x="436" y="150" width="328" height="362" rx="22" fill="url(#card)" stroke="#27345C" stroke-width="1.25"/>
  </g>
  <rect x="436" y="150" width="328" height="6" rx="3" fill="url(#acc2)"/>
  <circle cx="476" cy="200" r="21" fill="url(#acc2)"/>
  <text x="476" y="207" font-size="20" font-weight="700" fill="#06283A" text-anchor="middle">2</text>
  <!-- shield-check icon -->
  <g transform="translate(690,180)" stroke="#67E8F9" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M16,2 L30,8 V18 C30,28 23,33 16,36 C9,33 2,28 2,18 V8 Z"/>
    <path d="M10,18 l4.5,4.5 L23,13"/>
  </g>
  <text x="464" y="262" font-size="13" font-weight="700" fill="#22D3EE" letter-spacing="2">ATTESTATION</text>
  <text x="464" y="290" font-size="21" font-weight="700" fill="#EAF0FB">Tamper-evident seal</text>
  <line x1="464" y1="306" x2="736" y2="306" stroke="#2A3760" stroke-width="1.25"/>
  <g font-size="14.5" fill="#AEBCD6">
    <text x="464" y="338">A signed record rides with the</text>
    <text x="464" y="361">output: payload <tspan fill="#E4EAF6" font-weight="600">SHA-256</tspan>, timestamp,</text>
    <text x="464" y="384">TTL, claims, provenance, signature.</text>
    <text x="464" y="407">Change one byte → it breaks.</text>
  </g>
  <g font-size="12.5" font-weight="600">
    <rect x="464" y="446" width="86" height="30" rx="15" fill="#0B2E3A" stroke="#16788F"/>
    <text x="507" y="466" fill="#7FE3F4" text-anchor="middle">SHA-256</text>
    <rect x="560" y="446" width="136" height="30" rx="15" fill="#0B2E3A" stroke="#16788F"/>
    <text x="628" y="466" fill="#7FE3F4" text-anchor="middle">tamper-evident</text>
  </g>

  <!-- STAGE 3 -->
  <g filter="url(#shadow)">
    <rect x="808" y="150" width="328" height="362" rx="22" fill="url(#card)" stroke="#27345C" stroke-width="1.25"/>
  </g>
  <rect x="808" y="150" width="328" height="6" rx="3" fill="url(#acc3)"/>
  <circle cx="848" cy="200" r="21" fill="url(#acc3)"/>
  <text x="848" y="207" font-size="20" font-weight="700" fill="#053D2B" text-anchor="middle">3</text>
  <!-- gauge/check icon -->
  <g transform="translate(1060,180)" stroke="#6EE7B7" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4,30 a14,14 0 1 1 28,0"/>
    <path d="M18,30 L26,16"/>
    <circle cx="18" cy="30" r="2.6" fill="#6EE7B7" stroke="none"/>
  </g>
  <text x="836" y="262" font-size="13" font-weight="700" fill="#34D399" letter-spacing="2">VERIFY &amp; DECIDE</text>
  <text x="836" y="290" font-size="21" font-weight="700" fill="#EAF0FB">Four checks, one verdict</text>
  <line x1="836" y1="306" x2="1108" y2="306" stroke="#2A3760" stroke-width="1.25"/>
  <g font-size="14" fill="#C2CEE4">
    <g transform="translate(836,328)"><circle cx="6" cy="-4" r="6" fill="#16361F" stroke="#34D399"/><path d="M3,-4 l2,2 l4,-5" stroke="#34D399" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="22" y="0">Signature valid · id matches key</text></g>
    <g transform="translate(836,352)"><circle cx="6" cy="-4" r="6" fill="#16361F" stroke="#34D399"/><path d="M3,-4 l2,2 l4,-5" stroke="#34D399" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="22" y="0">Payload hash matches output</text></g>
    <g transform="translate(836,376)"><circle cx="6" cy="-4" r="6" fill="#16361F" stroke="#34D399"/><path d="M3,-4 l2,2 l4,-5" stroke="#34D399" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="22" y="0">Registered &amp; not revoked</text></g>
    <g transform="translate(836,400)"><circle cx="6" cy="-4" r="6" fill="#16361F" stroke="#34D399"/><path d="M3,-4 l2,2 l4,-5" stroke="#34D399" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="22" y="0">Reputation ≥ policy threshold</text></g>
  </g>
  <!-- verdict pills -->
  <g font-size="13" font-weight="700">
    <rect x="836" y="446" width="128" height="32" rx="16" fill="#0E3324" stroke="#34D399"/>
    <text x="900" y="467" fill="#6EE7B7" text-anchor="middle">✓  TRUST</text>
    <rect x="976" y="446" width="132" height="32" rx="16" fill="#3A1620" stroke="#F87171"/>
    <text x="1042" y="467" fill="#FCA5A5" text-anchor="middle">✕  REJECT</text>
  </g>

  <!-- ===== connecting chevrons between cards ===== -->
  <g stroke="#475579" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M404,318 l16,14 l-16,14"/>
    <path d="M776,318 l16,14 l-16,14"/>
  </g>

  <!-- ===== supporting datastores (consulted by stage 3) ===== -->
  <g font-size="13.5" font-weight="600">
    <g transform="translate(330,540)">
      <rect x="0" y="0" width="232" height="40" rx="12" fill="#131F3A" stroke="#2A3760"/>
      <g transform="translate(16,11)" stroke="#FBBF24" stroke-width="1.8" fill="none"><ellipse cx="9" cy="3" rx="9" ry="3.4"/><path d="M0,3 v11 a9,3.4 0 0 0 18,0 v-11"/></g>
      <text x="42" y="25" fill="#D7E0F0">Registry · who's known / revoked</text>
    </g>
    <g transform="translate(600,540)">
      <rect x="0" y="0" width="270" height="40" rx="12" fill="#131F3A" stroke="#2A3760"/>
      <g transform="translate(16,11)" stroke="#FBBF24" stroke-width="1.8" fill="none"><ellipse cx="9" cy="3" rx="9" ry="3.4"/><path d="M0,3 v11 a9,3.4 0 0 0 18,0 v-11"/></g>
      <text x="42" y="25" fill="#D7E0F0">Reputation ledger · trust score 0–1</text>
    </g>
  </g>

  <!-- ===== reputation feedback loop (verdict → reputation → next decision) ===== -->
  <path d="M972,512 C972,720 228,720 228,560" fill="none" stroke="#34D399" stroke-width="2.4"
        stroke-dasharray="2 9" stroke-linecap="round" marker-end="url(#arrowG)" opacity="0.95"/>
  <g>
    <rect x="446" y="648" width="308" height="44" rx="22" fill="#0F2A24" stroke="#1F6B53"/>
    <g transform="translate(470,663)" stroke="#6EE7B7" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M14,3 a8,8 0 1 1 -7,4"/><path d="M7,2 l0,5 l5,0"/>
    </g>
    <text x="500" y="676" font-size="14.5" font-weight="600" fill="#A7E9D2">Outcomes feed back into each agent's reputation (time-decayed)</text>
  </g>

  <!-- footer caption -->
  <text x="600" y="726" font-size="13" fill="#5C6B8A" text-anchor="middle">Identity · Attestation · Reputation — verified locally in milliseconds, no network round-trip.</text>
</svg>
